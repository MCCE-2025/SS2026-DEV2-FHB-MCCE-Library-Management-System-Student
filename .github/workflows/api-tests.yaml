name: API Tests

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  api-tests:
    name: API tests (Vitest + supertest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests with coverage
        run: npm run test:api:ci

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: |
            test-results/junit-api.xml
            coverage-api/cobertura-coverage.xml
          retention-days: 14
